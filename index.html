<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCP Exam Trainer</title>
</head>
<body>

    <h1>TCP Exam Trainer</h1>

    <h3 id="counter">Cargando...</h3>

    <h2 id="question">Cargando pregunta...</h2>

    <div id="answers"></div>

    <br>

    <button id="nextBtn">Siguiente</button>

    <p id="result"></p>

    <script>
        let questions = [];
        let currentQuestion = 0;

        async function loadQuestions() {
            try {
                const response = await fetch('./data/questions.json?ts=' + Date.now(), {
                    cache: 'no-store'
                });

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ' al cargar questions.json');
                }

                const text = await response.text();

                if (!text.trim()) {
                    throw new Error('questions.json está vacío');
                }

                questions = JSON.parse(text);

                if (!Array.isArray(questions) || questions.length === 0) {
                    throw new Error('questions.json no contiene un array válido de preguntas');
                }

                showQuestion();
            } catch (error) {
                console.error(error);
                document.getElementById('question').innerText =
                    'Error cargando preguntas: ' + error.message;
                document.getElementById('counter').innerText = '';
            }
        }

        function showQuestion() {
            const q = questions[currentQuestion];

            document.getElementById("counter").innerText =
                `Pregunta ${currentQuestion + 1} / ${questions.length}`;

            document.getElementById("question").innerText = q.question;

            document.getElementById("result").innerText = "";

            const answersDiv = document.getElementById("answers");
            answersDiv.innerHTML = "";

            q.options.forEach((option, index) => {
                const btn = document.createElement("button");
                btn.innerText = option;
                btn.style.display = "block";
                btn.style.margin = "10px 0";

                btn.onclick = () => {
                    document.getElementById("result").innerText =
                        index === q.correct ? "✅ Correcto" : "❌ Incorrecto";
                };

                answersDiv.appendChild(btn);
            });
        }

        document.getElementById("nextBtn").onclick = () => {
            currentQuestion++;
            if (currentQuestion >= questions.length) {
                currentQuestion = 0;
            }
            showQuestion();
        };

        loadQuestions();
    </script>

</body>
</html>
