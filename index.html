<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>TCP Exam Trainer</title>

    <meta
        name="theme-color"
        content="#1976d2"
    >

    <link
        rel="manifest"
        href="manifest.json"
    >

    <link
        rel="stylesheet"
        href="css/styles.css"
    >

</head>
<body>

    <h1>TCP Exam Trainer</h1>

    <div class="mode-selector">

        <button id="practiceMode">
            📚 Práctica
        </button>

        <button id="examMode">
            📝 Simulacro AESA
        </button>

        <button id="reviewErrorsMode">
            ❌ Repasar errores
            (<span id="errorCount">0</span>)
        </button>

    </div>

    <div class="info-card">

        <div id="topic">
            Tema
        </div>

        <div id="stats">

            <span>
                ✅ <span id="correctCount">0</span>
            </span>

            <span>
                ❌ <span id="wrongCount">0</span>
            </span>

        </div>

        <div id="timer">
            ⏱️ --:--
        </div>

        <div id="examProgress"></div>

        <div id="examMissing"></div>

        <select id="subjectFilter">

            <option value="all">
                Todas las asignaturas
            </option>

            <option value="normativa">
                Normativa
            </option>

            <option value="crm">
                CRM
            </option>

            <option value="mercancias_peligrosas">
                Mercancías Peligrosas
            </option>

            <option value="seguridad">
                Seguridad
            </option>

            <option value="emergencias">
                Emergencias
            </option>

            <option value="primeros_auxilios">
                Primeros Auxilios
            </option>

            <option value="factores_humanos">
                Factores Humanos
            </option>

            <option value="supervivencia">
                Supervivencia
            </option>

        </select>

        <div class="progress-container">

            <div id="progress-bar"></div>

        </div>

    </div>

    <h3 id="counter">
        Cargando...
    </h3>

    <h2 id="question">
        Cargando pregunta...
    </h2>

    <div id="answers"></div>

    <div class="navigation-buttons">

        <button
            id="prevBtn"
            style="display:none;"
        >
            ← Anterior
        </button>

        <button id="nextBtn">
            Siguiente →
        </button>

    </div>

    <button
        id="finishExamBtn"
        style="display:none;"
    >
        🏁 Finalizar examen
    </button>

    <div id="result"></div>

    <div id="explanation"></div>

    <div id="examResult">

        <h2>
            Simulacro finalizado
        </h2>

        <div id="examScore"></div>

        <button id="restartExam">
            Nuevo simulacro
        </button>

    </div>

    <div id="examHistory">

        <h2>
            Historial de simulacros
        </h2>

        <div id="historyList">
            No hay simulacros realizados.
        </div>

    </div>

    <script src="js/stats.js"></script>
    <script src="js/app.js"></script>

    <script>

        if (
            'serviceWorker' in navigator
        ) {

            window.addEventListener(
                'load',
                () => {

                    navigator.serviceWorker
                        .register(
                            './service-worker.js'
                        )
                        .then(() => {

                            console.log(
                                'PWA registrada'
                            );

                        })
                        .catch(error => {

                            console.error(
                                'Error registrando PWA:',
                                error
                            );

                        });
                }
            );
        }

    </script>

</body>
</html>
