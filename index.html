<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCP Exam Trainer</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <h1>TCP Exam Trainer</h1>

    <div class="mode-selector">

        <button id="practiceMode">
            📚 Práctica
        </button>

        <button id="examMode">
            📝 Simulacro AESA
        </button>

    </div>

    <div class="info-card">

        <div id="topic">Tema</div>

        <div id="stats">
            <span>✅ <span id="correctCount">0</span></span>
            <span>❌ <span id="wrongCount">0</span></span>
        </div>

        <div id="timer">
            ⏱️ --:--
        </div>

        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

    </div>

    <h3 id="counter">Cargando...</h3>

    <h2 id="question">Cargando pregunta...</h2>

    <div id="answers"></div>

    <button id="nextBtn">
        Siguiente →
    </button>

    <div id="result"></div>

    <div id="explanation"></div>

    <div id="examResult">

        <h2>Simulacro finalizado</h2>

        <div id="examScore"></div>

        <button id="restartExam">
            Nuevo simulacro
        </button>

    </div>

    <div id="examHistory">

        <h2>Historial de simulacros</h2>

        <div id="historyList">
            No hay simulacros realizados.
        </div>

    </div>

    <script src="js/stats.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
